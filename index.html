<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Leader Draft</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  background: #fff;
  color: #111;
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

/* Top tabs */
#tabs {
  height: 46px;
  display: flex;
  background: #111;
}
.tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: Arial Black, Impact, sans-serif;
  font-size: .95rem;
  letter-spacing: 2px;
  color: #888;
  border-bottom: 4px solid transparent;
  user-select: none;
}
.tab.active {
  color: #FFE000;
  border-bottom-color: #FFE000;
}

/* Panels */
.panel { display: none; }
.panel.active { display: flex; flex-direction: column; }

#panel-draft.active {
  height: calc(100vh - 46px);
  overflow-y: auto;
}

#panel-summary.active {
  min-height: calc(100vh - 46px);
  overflow-y: auto;
  padding: 8px;
}

/* Status bar */
#status {
  text-align: center;
  padding: 6px 8px;
  font-family: Arial Black, Impact, sans-serif;
  font-size: .9rem;
  letter-spacing: 2px;
  background: #111;
  color: #FFE000;
  flex-shrink: 0;
}

/* Draft grid */
#grid-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: stretch;
  min-height: 0;
  padding: 4px 12px;
}

#grid {
  width: min(100%, 1150px);
  display: grid;
  grid-template-rows: repeat(5, 1fr);
  gap: 3px;
  min-height: 0;
}

.row {
  display: grid;
  grid-template-columns: clamp(34px, 5vw, 66px) minmax(0, 1fr);
  align-items: stretch;
  min-height: 0;
  gap: 3px;
}

.dollar {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial Black, Impact, sans-serif;
  font-weight: 900;
  color: #111;
  font-size: clamp(1.2rem, 4.5vh, 3.5rem);
  line-height: 1;
}

.cards {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 3px;
  min-width: 0;
  min-height: 0;
}

.card {
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
  background: #111;
}

.card img {
  width: 100%;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  min-height: 0;
  object-fit: contain;
  object-position: center center;
  display: block;
  pointer-events: none;
  background: #111;
}

.label {
  position: static;
  min-height: 28px;
  padding: 3px 4px 4px;
  background: #111;
}

.name {
  font-weight: 900;
  font-family: Arial Black, Impact, sans-serif;
  font-size: clamp(6px, 1vh, 13px);
  color: #FFE000;
  text-transform: uppercase;
  letter-spacing: .8px;
  text-shadow: 1px 1px 2px #000;
  line-height: 1.05;
}

.sub {
  margin-top: 1px;
  font-size: clamp(5px, .75vh, 10px);
  color: #eee;
  text-transform: uppercase;
  letter-spacing: .8px;
  text-shadow: 1px 1px 2px #000;
  line-height: 1.05;
}

.card.on {
  outline: 3px solid #FFE000;
  outline-offset: -3px;
}

.card.off {
  opacity: 0.25;
  cursor: not-allowed;
}

/* Submit/result panel */
#submit-section {
  display: none;
  width: calc(100% - 24px);
  max-width: 1150px;
  margin: 6px auto 18px;
  border: 4px solid #FFE000;
  padding: 16px;
  text-align: center;
  background: #fff;
}

#submit-section h2 {
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 3px;
  margin-bottom: 12px;
}

#result-picks {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
}

.pick {
  flex: 1;
  max-width: 200px;
  border: 2px solid #ddd;
  overflow: hidden;
  background: #fff;
}

.pick img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: contain;
  object-position: center center;
  display: block;
  background: #111;
}

.pick-info {
  padding: 6px;
  text-align: center;
}

.pick-name {
  font-family: Arial Black, Impact, sans-serif;
  font-size: clamp(10px, 1.2vw, 14px);
  text-transform: uppercase;
  line-height: 1.1;
}

.pick-sub {
  font-size: 10px;
  color: #666;
  text-transform: uppercase;
  margin-top: 2px;
}

.pick-cost {
  font-family: Arial Black, Impact, sans-serif;
  font-size: 1.4rem;
  margin-top: 3px;
}

#name-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

#player-name {
  padding: 10px 16px;
  font-size: 1rem;
  border: 2px solid #111;
  width: 240px;
  letter-spacing: 1px;
}

#submit-btn,
#reset-btn {
  padding: 10px 24px;
  font-family: Arial Black, Impact, sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  border: none;
  cursor: pointer;
}

#submit-btn {
  background: #FFE000;
  color: #111;
}

#submit-btn:hover { background: #ffd000; }

#reset-btn {
  background: #111;
  color: #fff;
}

#submit-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

#submit-msg {
  margin-top: 10px;
  font-size: 13px;
  font-weight: bold;
  min-height: 20px;
}


/* Average team summary */
#avg-team {
  margin-bottom: 16px;
  border: 4px solid #111;
  padding: 14px;
  background: #fff;
}
#avg-team h3 {
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 2px;
  font-size: 1rem;
  margin-bottom: 6px;
}
#avg-explain {
  font-size: 12px;
  color: #555;
  margin-bottom: 10px;
  line-height: 1.35;
}
#avg-picks {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.avg-card {
  border: 2px solid #ddd;
  overflow: hidden;
  background: #fff;
}
.avg-card img {
  width: 100%;
  aspect-ratio: 1.15;
  object-fit: contain;
  object-position: center center;
  display: block;
  background: #111;
}
.avg-info {
  padding: 7px;
}
.avg-name {
  font-family: Arial Black, Impact, sans-serif;
  font-size: clamp(10px, 1.2vw, 14px);
  color: #111;
  text-transform: uppercase;
  line-height: 1.1;
}
.avg-sub {
  font-size: 10px;
  color: #666;
  text-transform: uppercase;
  margin-top: 2px;
}
.avg-meta {
  margin-top: 5px;
  display: flex;
  justify-content: space-between;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
}
.avg-cost {
  font-family: Arial Black, Impact, sans-serif;
}
.avg-score {
  color: #555;
}

/* Summary */
#summary-inner {
  max-width: 1150px;
  width: 100%;
  margin: 0 auto;
}

#summary-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  margin-bottom: 8px;
  gap: 12px;
}

#summary-header h2 {
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 3px;
}

#refresh-btn {
  padding: 7px 18px;
  font-family: Arial Black, Impact, sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  background: #111;
  color: #fff;
  border: none;
  cursor: pointer;
}

#summary-stats {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.stat-box {
  flex: 1;
  min-width: 100px;
  background: #111;
  color: #FFE000;
  padding: 10px;
  text-align: center;
}

.stat-num {
  font-family: Arial Black, Impact, sans-serif;
  font-size: 1.8rem;
  line-height: 1;
}

.stat-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: #aaa;
  margin-top: 3px;
  text-transform: uppercase;
}

#summary-table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead {
  background: #111;
  color: #FFE000;
}

th {
  padding: 10px 8px;
  text-align: left;
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 1px;
  font-size: 11px;
  white-space: nowrap;
}

td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  vertical-align: middle;
}

tr:hover td { background: #fffde7; }

.pick-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.chip {
  background: #111;
  color: #FFE000;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  white-space: nowrap;
}

.chip span {
  color: #aaa;
  font-weight: 400;
}

#popular {
  margin-top: 16px;
}

#popular h3 {
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 2px;
  margin-bottom: 8px;
  font-size: 1rem;
}

.pop-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.pop-label {
  font-size: 12px;
  font-weight: bold;
  min-width: 140px;
}

.pop-bar-wrap {
  flex: 1;
  background: #eee;
  height: 22px;
}

.pop-bar {
  background: #FFE000;
  height: 100%;
  min-width: 4px;
}

.pop-count {
  font-size: 12px;
  color: #666;
  min-width: 36px;
  text-align: right;
}

#summary-empty {
  text-align: center;
  padding: 40px;
  color: #aaa;
  font-size: 14px;
  letter-spacing: 2px;
}

/* Mobile */
@media (max-width: 600px) {
  #panel-draft.active {
    height: auto;
    min-height: calc(100vh - 46px);
  }

  #grid-wrap {
    padding: 2px 4px;
  }

  #grid {
    width: 100%;
    gap: 2px;
  }

  .row {
    height: 22vw;
    grid-template-columns: 32px minmax(0, 1fr);
    gap: 2px;
  }

  .cards {
    gap: 2px;
  }

  .dollar {
    font-size: clamp(1rem, 5.5vw, 1.8rem);
  }

  .label {
    min-height: 24px;
    padding: 2px 3px 3px;
  }

  .name {
    font-size: clamp(5px, 1.65vw, 9px);
    letter-spacing: .25px;
  }

  .sub {
    font-size: clamp(4px, 1.25vw, 7px);
    letter-spacing: .25px;
  }

  .tab {
    font-size: .75rem;
    letter-spacing: 1px;
  }

  #result-picks {
    gap: 5px;
  }

  #avg-picks {
    grid-template-columns: 1fr;
  }


  #submit-section {
    width: calc(100% - 8px);
    padding: 10px;
  }

  #player-name {
    width: 100%;
  }

  #submit-btn,
  #reset-btn {
    flex: 1;
    padding: 10px 12px;
  }
}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="showTab('draft')">DRAFT BOARD</div>
  <div class="tab" onclick="showTab('summary')">SUMMARY</div>
</div>

<div id="panel-draft" class="panel active">
  <div id="status">WORLD LEADER DRAFT — $10 BUDGET · PICK 3</div>
  <div id="grid-wrap"><div id="grid"></div></div>

  <div id="submit-section">
    <h2>YOUR TEAM</h2>
    <div id="result-picks"></div>
    <div id="name-row">
      <input id="player-name" type="text" placeholder="Enter your name..." maxlength="40" autocomplete="name">
      <button id="submit-btn" onclick="submitDraft()">SUBMIT DRAFT</button>
      <button id="reset-btn" onclick="resetDraft()">↺ RESET</button>
    </div>
    <div id="submit-msg"></div>
  </div>
</div>

<div id="panel-summary" class="panel">
  <div id="summary-inner">
    <div id="summary-header">
      <h2>DRAFT SUMMARY</h2>
      <button id="refresh-btn" onclick="loadSummary()">↺ REFRESH</button>
    </div>
    <div id="summary-stats"></div>
    <div id="avg-team"></div>
    <div id="popular"></div>
  </div>
</div>

<script>
const WORKER = "https://leader-draft.phummylw.workers.dev";

/*
  Images are expected in the repo at:
  assets/lincoln.jpg
  assets/fdr.jpg
  etc.

  The pos value fixes the ridiculous crop issue caused by forcing portrait images
  into wide landscape cards.
*/
const ALL = [
  {id:1, n:"Abraham Lincoln",       c:"USA",          y:"1861-65",         $:5, img:"assets/leaders/lincoln.jpg",           pos:"center 37%"},
  {id:2, n:"Franklin D. Roosevelt", c:"USA",          y:"1933-45",         $:5, img:"assets/leaders/fdr.jpg",               pos:"center 36%"},
  {id:3, n:"Alexander the Great",   c:"Macedon",      y:"336-323 BC",      $:5, img:"assets/leaders/alexander.jpg",         pos:"center 42%"},
  {id:4, n:"Nelson Mandela",        c:"South Africa", y:"1994-99",         $:5, img:"assets/leaders/mandela.jpg",           pos:"center 36%"},
  {id:5, n:"Lee Kuan Yew",          c:"Singapore",    y:"1959-90",         $:5, img:"assets/leaders/lee-kuan-yew.jpg",      pos:"center 35%"},

  {id:6, n:"Mahatma Gandhi",        c:"India",        y:"1915-48",         $:4, img:"assets/leaders/gandhi.jpg",            pos:"center 42%"},
  {id:7, n:"Mustafa Kemal Ataturk", c:"Turkey",       y:"1923-38",         $:4, img:"assets/leaders/ataturk.jpg",           pos:"center 34%"},
  {id:8, n:"Winston Churchill",     c:"UK",           y:"1940-55",         $:4, img:"assets/leaders/churchill.jpg",         pos:"center 35%"},
  {id:9, n:"Julius Caesar",         c:"Rome",         y:"49-44 BC",        $:4, img:"assets/leaders/caesar.jpg",            pos:"center 42%"},
  {id:10,n:"Marcus Aurelius",       c:"Rome",         y:"161-180",         $:4, img:"assets/leaders/marcus-aurelius.jpg",   pos:"center 40%"},

  {id:11,n:"Napoleon Bonaparte",    c:"France",       y:"1804-14",         $:3, img:"assets/leaders/napoleon.jpg",          pos:"center 45%"},
  {id:12,n:"Genghis Khan",          c:"Mongolia",     y:"1206-27",         $:3, img:"assets/leaders/genghis-khan.jpg",      pos:"center 45%"},
  {id:13,n:"Elizabeth I",           c:"England",      y:"1558-1603",       $:3, img:"assets/leaders/elizabeth-i.jpg",       pos:"center 40%"},
  {id:14,n:"Margaret Thatcher",     c:"UK",           y:"1979-90",         $:3, img:"assets/leaders/thatcher.png",          pos:"center 35%"},
  {id:15,n:"Otto von Bismarck",     c:"Germany",      y:"1871-90",         $:3, img:"assets/leaders/bismarck.jpg",          pos:"center 35%"},

  {id:16,n:"Cleopatra",             c:"Egypt",        y:"51-30 BC",        $:2, img:"assets/leaders/cleopatra.jpg",         pos:"center 62%"},
  {id:17,n:"Henry VIII",            c:"England",      y:"1509-47",         $:2, img:"assets/leaders/henry-viii.jpg",        pos:"center 35%"},
  {id:18,n:"John F. Kennedy",       c:"USA",          y:"1961-63",         $:2, img:"assets/leaders/jfk.jpg",               pos:"center 38%"},
  {id:19,n:"Mao Zedong",            c:"China",        y:"1949-76",         $:2, img:"assets/leaders/mao.jpg",               pos:"center 35%"},
  {id:20,n:"Donald Trump",          c:"USA",          y:"2017-21 & 2025-", $:2, img:"assets/leaders/trump.jpg",             pos:"center 35%"},

  {id:21,n:"Adolf Hitler",          c:"Germany",      y:"1933-45",         $:1, img:"assets/leaders/hitler.jpg",            pos:"center 35%"},
  {id:22,n:"Joseph Stalin",         c:"USSR",         y:"1924-53",         $:1, img:"assets/leaders/stalin.jpg",            pos:"center 35%"},
  {id:23,n:"Saddam Hussein",        c:"Iraq",         y:"1979-2003",       $:1, img:"assets/leaders/saddam.jpg",            pos:"center 38%"},
  {id:24,n:"Pol Pot",               c:"Cambodia",     y:"1975-79",         $:1, img:"assets/leaders/pol-pot.jpg",           pos:"center 35%"},
  {id:25,n:"Vladimir Putin",        c:"Russia",       y:"2000-present",    $:1, img:"assets/leaders/putin.jpg",             pos:"center 35%"},
];

let sel = [];

function leaderById(id) {
  return ALL.find(l => l.id === id);
}

function spent() {
  return sel.reduce((sum, id) => sum + leaderById(id).$, 0);
}

function rem() {
  return 10 - spent();
}

function getDraftValidation() {
  const ids = sel.map(Number);
  const uniqueIds = new Set(ids);

  if (ids.length !== 3) {
    return { ok: false, error: "Draft must have exactly 3 picks." };
  }

  if (uniqueIds.size !== 3) {
    return { ok: false, error: "Duplicate picks are not allowed." };
  }

  const picks = ids.map(id => leaderById(id));

  if (picks.some(p => !p)) {
    return { ok: false, error: "Draft contains an unknown leader." };
  }

  const total = picks.reduce((sum, p) => sum + p.$, 0);

  if (total !== 10) {
    return { ok: false, error: "Draft must total exactly $10." };
  }

  return { ok: true, error: "", ids, picks, total };
}

function isValidDraft() {
  return getDraftValidation().ok;
}

function esc(text) {
  return String(text).replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[ch]));
}

function imgTag(src, alt, pos = "center center") {
  return `<img src="${esc(src)}" alt="${esc(alt)}" decoding="async" style="--pos:${esc(pos)};">`;
}

function toggle(id) {
  const index = sel.indexOf(id);

  if (index > -1) {
    sel.splice(index, 1);
    render();
    return;
  }

  const leader = leaderById(id);
  if (!leader) return;
  if (sel.length >= 3) return;
  if (leader.$ > rem()) return;

  sel.push(id);
  render();
}

function render() {
  const remaining = rem();
  const done = sel.length === 3 && spent() === 10;

  document.getElementById("status").textContent = done
    ? "✓ TEAM COMPLETE — ENTER YOUR NAME BELOW"
    : "BUDGET: $" + remaining + "  ·  PICKS: " + sel.length + "/3";

  document.getElementById("grid").innerHTML = [5, 4, 3, 2, 1].map(cost => {
    const cards = ALL.filter(l => l.$ === cost).map(l => {
      const on = sel.includes(l.id);
      const off = !on && (l.$ > remaining || sel.length >= 3);

      return `<div class="card${on ? " on" : ""}${off ? " off" : ""}" onclick="toggle(${l.id})">
        ${imgTag(l.img, l.n, l.pos)}
        <div class="label">
          <div class="name">${esc(l.n)}</div>
          <div class="sub">${esc(l.c)} · ${esc(l.y)}</div>
        </div>
      </div>`;
    }).join("");

    return `<div class="row"><div class="dollar">$${cost}</div><div class="cards">${cards}</div></div>`;
  }).join("");

  const submitSection = document.getElementById("submit-section");
  const validation = getDraftValidation();

  if (done && validation.ok) {
    document.getElementById("result-picks").innerHTML = validation.picks.map(l => {
      return `<div class="pick">
        ${imgTag(l.img, l.n, l.pos)}
        <div class="pick-info">
          <div class="pick-name">${esc(l.n)}</div>
          <div class="pick-sub">${esc(l.c)} · ${esc(l.y)}</div>
          <div class="pick-cost">$${l.$}</div>
        </div>
      </div>`;
    }).join("");

    submitSection.style.display = "block";

    const msg = document.getElementById("submit-msg");
    if (!msg.dataset.keep) {
      msg.textContent = "";
      msg.style.color = "#111";
      document.getElementById("submit-btn").disabled = false;
    }

    setTimeout(() => submitSection.scrollIntoView({ behavior: "smooth", block: "nearest" }), 50);
  } else {
    submitSection.style.display = "none";
    const msg = document.getElementById("submit-msg");
    msg.dataset.keep = "";
    document.getElementById("submit-btn").disabled = true;
  }
}

function resetDraft() {
  sel = [];
  document.getElementById("player-name").value = "";
  const msg = document.getElementById("submit-msg");
  msg.textContent = "";
  msg.dataset.keep = "";
  document.getElementById("submit-btn").disabled = false;
  render();
}

async function submitDraft() {
  const nameInput = document.getElementById("player-name");
  const name = nameInput.value.trim();
  const btn = document.getElementById("submit-btn");
  const msg = document.getElementById("submit-msg");
  const validation = getDraftValidation();

  if (!name) {
    msg.style.color = "red";
    msg.textContent = "Please enter your name.";
    return;
  }

  if (!validation.ok) {
    msg.style.color = "red";
    msg.textContent = validation.error;
    btn.disabled = true;
    return;
  }

  btn.disabled = true;
  msg.dataset.keep = "1";
  msg.style.color = "#111";
  msg.textContent = "Saving...";

  try {
    const res = await fetch(WORKER, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name,
        pickIds: validation.ids,
        picks: validation.picks.map(l => ({
          id: l.id,
          name: l.n,
          country: l.c,
          years: l.y,
          cost: l.$
        })),
        total: validation.total,
        timestamp: new Date().toISOString()
      })
    });

    let body = {};
    try { body = await res.json(); } catch (_) {}

    if (!res.ok) {
      throw new Error(body.error || "Worker responded " + res.status);
    }

    msg.style.color = "green";
    msg.textContent = "✓ Draft saved. Check the Summary tab.";
    btn.disabled = true;
  } catch (e) {
    msg.style.color = "red";
    msg.textContent = "✗ " + e.message;
    btn.disabled = false;
  }
}

function getStoredDraftPicks(draft) {
  if (Array.isArray(draft?.picks) && draft.picks.length) {
    return draft.picks;
  }

  if (Array.isArray(draft?.pickIds)) {
    return draft.pickIds
      .map(id => leaderById(Number(id)))
      .filter(Boolean)
      .map(l => ({
        id: l.id,
        name: l.n,
        country: l.c,
        years: l.y,
        cost: l.$
      }));
  }

  return [];
}

async function loadSummary() {
  document.getElementById("avg-team").innerHTML = '<div id="summary-empty">Loading...</div>';
  document.getElementById("summary-stats").innerHTML = "";
  document.getElementById("popular").innerHTML = "";

  let data;

  try {
    const res = await fetch(WORKER, { method: "GET" });
    const j = await res.json();
    if (!res.ok) throw new Error(j.error || "Worker responded " + res.status);
    data = Array.isArray(j.data) ? j.data : [];
  } catch (e) {
    document.getElementById("avg-team").innerHTML =
      `<div id="summary-empty">Error loading summary: ${esc(e.message)}</div>`;
    return;
  }

  if (!data.length) {
    document.getElementById("avg-team").innerHTML =
      '<div id="summary-empty">NO DRAFTS YET — BE THE FIRST!</div>';
    return;
  }

  const counts = {};
  let validDrafts = 0;

  for (const draft of data) {
    const picks = getStoredDraftPicks(draft);
    if (picks.length !== 3) continue;
    validDrafts++;

    for (const pick of picks) {
      counts[pick.name] = (counts[pick.name] || 0) + 1;
    }
  }

  const sortedCounts = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  const top = sortedCounts[0] || ["None", 0];
  const avgTeam = calculateAverageTeam(counts);

  document.getElementById("summary-stats").innerHTML = `
    <div class="stat-box">
      <div class="stat-num">${data.length}</div>
      <div class="stat-label">Total Drafts</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${Object.keys(counts).length}</div>
      <div class="stat-label">Leaders Picked</div>
    </div>
    <div class="stat-box" style="flex:2">
      <div class="stat-num" style="font-size:1rem;margin-top:6px">${esc(top[0])}</div>
      <div class="stat-label">Most Popular (${top[1]}x)</div>
    </div>`;

  document.getElementById("avg-team").innerHTML = `
    <h3>AVERAGE 3-PERSON DRAFT</h3>
    <div id="avg-explain">
      This is the summary's best-fit average team: the highest-scoring legal 3-leader, $10 combination based on actual pick frequency.
    </div>
    <div id="avg-picks">
      ${avgTeam.map(l => {
        const pickCount = counts[l.n] || 0;
        const pct = validDrafts ? Math.round((pickCount / validDrafts) * 100) : 0;

        return `<div class="avg-card">
          ${imgTag(l.img, l.n, l.pos)}
          <div class="avg-info">
            <div class="avg-name">${esc(l.n)}</div>
            <div class="avg-sub">${esc(l.c)} · ${esc(l.y)}</div>
            <div class="avg-meta">
              <span class="avg-cost">$${l.$}</span>
              <span class="avg-score">${pickCount} picks · ${pct}%</span>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`;

  const max = Math.max(...Object.values(counts));

  document.getElementById("popular").innerHTML = `<h3>MOST DRAFTED LEADERS</h3>` +
    sortedCounts.slice(0, 10).map(([name, count]) =>
      `<div class="pop-row">
        <div class="pop-label">${esc(name)}</div>
        <div class="pop-bar-wrap"><div class="pop-bar" style="width:${Math.round(count / max * 100)}%"></div></div>
        <div class="pop-count">${count}x</div>
      </div>`
    ).join("");
}

function calculateAverageTeam(counts) {
  let best = null;
  const validCostCombos = new Set(["5,4,1", "5,3,2", "4,4,2", "4,3,3"]);

  for (let i = 0; i < ALL.length; i++) {
    for (let j = i + 1; j < ALL.length; j++) {
      for (let k = j + 1; k < ALL.length; k++) {
        const team = [ALL[i], ALL[j], ALL[k]];
        const total = team.reduce((sum, l) => sum + l.$, 0);
        if (total !== 10) continue;

        const costShape = team.map(l => l.$).sort((a, b) => b - a).join(",");
        if (!validCostCombos.has(costShape)) continue;

        const score = team.reduce((sum, l) => sum + (counts[l.n] || 0), 0);
        const topPickScore = Math.max(...team.map(l => counts[l.n] || 0));
        const spreadScore = team.filter(l => (counts[l.n] || 0) > 0).length;

        const candidate = { team, score, topPickScore, spreadScore };

        if (!best ||
            candidate.score > best.score ||
            (candidate.score === best.score && candidate.spreadScore > best.spreadScore) ||
            (candidate.score === best.score && candidate.spreadScore === best.spreadScore && candidate.topPickScore > best.topPickScore) ||
            (candidate.score === best.score && candidate.spreadScore === best.spreadScore && candidate.topPickScore === best.topPickScore && compareTeamNames(candidate.team, best.team) < 0)) {
          best = candidate;
        }
      }
    }
  }

  return best ? best.team : [];
}

function compareTeamNames(a, b) {
  const an = a.map(l => l.n).sort().join("|");
  const bn = b.map(l => l.n).sort().join("|");
  return an.localeCompare(bn);
}

function showTab(id) {
  document.querySelectorAll(".tab").forEach((tab, i) => {
    tab.classList.toggle("active", ["draft", "summary"][i] === id);
  });

  document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
  document.getElementById("panel-" + id).classList.add("active");

  if (id === "summary") loadSummary();
}

render();
</script>

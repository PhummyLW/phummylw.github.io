<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Leader Draft</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  background: #fff;
  color: #111;
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

/* Top tabs */
#tabs {
  height: 46px;
  display: flex;
  background: #111;
}
.tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: Arial Black, Impact, sans-serif;
  font-size: .95rem;
  letter-spacing: 2px;
  color: #888;
  border-bottom: 4px solid transparent;
  user-select: none;
}
.tab.active {
  color: #FFE000;
  border-bottom-color: #FFE000;
}

/* Panels */
.panel { display: none; }
.panel.active { display: flex; flex-direction: column; }

#panel-draft.active {
  height: calc(100vh - 46px);
  overflow-y: auto;
}

#panel-lb.active {
  min-height: calc(100vh - 46px);
  overflow-y: auto;
  padding: 8px;
}

/* Status bar */
#status {
  text-align: center;
  padding: 6px 8px;
  font-family: Arial Black, Impact, sans-serif;
  font-size: .9rem;
  letter-spacing: 2px;
  background: #111;
  color: #FFE000;
  flex-shrink: 0;
}

/* Draft grid */
#grid-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: stretch;
  min-height: 0;
  padding: 4px 12px;
}

#grid {
  width: 100%;
  max-width: 1150px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-height: 0;
}

.row {
  flex: 1;
  display: flex;
  align-items: stretch;
  min-height: 0;
  gap: 3px;
}

.dollar {
  width: clamp(36px, 6vw, 72px);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial Black, Impact, sans-serif;
  font-weight: 900;
  color: #111;
  font-size: clamp(1.2rem, 4.5vh, 3.8rem);
  line-height: 1;
}

.cards {
  flex: 1;
  display: flex;
  gap: 3px;
  min-width: 0;
}

.card {
  flex: 1;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  min-width: 0;
  background: #ddd;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  pointer-events: none;
}

.label {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 40% 3px 4px;
  background: linear-gradient(transparent, rgba(0,0,0,0.88));
}

.name {
  font-weight: 900;
  font-family: Arial Black, Impact, sans-serif;
  font-size: clamp(6px, 1vh, 13px);
  color: #FFE000;
  text-transform: uppercase;
  letter-spacing: .8px;
  text-shadow: 1px 1px 2px #000;
  line-height: 1.05;
}

.sub {
  margin-top: 1px;
  font-size: clamp(5px, .75vh, 10px);
  color: #eee;
  text-transform: uppercase;
  letter-spacing: .8px;
  text-shadow: 1px 1px 2px #000;
  line-height: 1.05;
}

.card.on {
  outline: 3px solid #FFE000;
  outline-offset: -3px;
}

.card.off {
  opacity: 0.25;
  cursor: not-allowed;
}

/* Submit/result panel */
#submit-section {
  display: none;
  width: calc(100% - 24px);
  max-width: 1150px;
  margin: 6px auto 18px;
  border: 4px solid #FFE000;
  padding: 16px;
  text-align: center;
  background: #fff;
}

#submit-section h2 {
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 3px;
  margin-bottom: 12px;
}

#result-picks {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
}

.pick {
  flex: 1;
  max-width: 200px;
  border: 2px solid #ddd;
  overflow: hidden;
  background: #fff;
}

.pick img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  object-position: center top;
  display: block;
  background: #ddd;
}

.pick-info {
  padding: 6px;
  text-align: center;
}

.pick-name {
  font-family: Arial Black, Impact, sans-serif;
  font-size: clamp(10px, 1.2vw, 14px);
  text-transform: uppercase;
  line-height: 1.1;
}

.pick-sub {
  font-size: 10px;
  color: #666;
  text-transform: uppercase;
  margin-top: 2px;
}

.pick-cost {
  font-family: Arial Black, Impact, sans-serif;
  font-size: 1.4rem;
  margin-top: 3px;
}

#name-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

#player-name {
  padding: 10px 16px;
  font-size: 1rem;
  border: 2px solid #111;
  width: 240px;
  letter-spacing: 1px;
}

#submit-btn,
#reset-btn {
  padding: 10px 24px;
  font-family: Arial Black, Impact, sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  border: none;
  cursor: pointer;
}

#submit-btn {
  background: #FFE000;
  color: #111;
}

#submit-btn:hover { background: #ffd000; }

#reset-btn {
  background: #111;
  color: #fff;
}

#submit-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

#submit-msg {
  margin-top: 10px;
  font-size: 13px;
  font-weight: bold;
  min-height: 20px;
}

/* Leaderboard */
#lb-inner {
  max-width: 1150px;
  width: 100%;
  margin: 0 auto;
}

#lb-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  margin-bottom: 8px;
  gap: 12px;
}

#lb-header h2 {
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 3px;
}

#refresh-btn {
  padding: 7px 18px;
  font-family: Arial Black, Impact, sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  background: #111;
  color: #fff;
  border: none;
  cursor: pointer;
}

#lb-stats {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.stat-box {
  flex: 1;
  min-width: 100px;
  background: #111;
  color: #FFE000;
  padding: 10px;
  text-align: center;
}

.stat-num {
  font-family: Arial Black, Impact, sans-serif;
  font-size: 1.8rem;
  line-height: 1;
}

.stat-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: #aaa;
  margin-top: 3px;
  text-transform: uppercase;
}

#lb-table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead {
  background: #111;
  color: #FFE000;
}

th {
  padding: 10px 8px;
  text-align: left;
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 1px;
  font-size: 11px;
  white-space: nowrap;
}

td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  vertical-align: middle;
}

tr:hover td { background: #fffde7; }

.pick-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.chip {
  background: #111;
  color: #FFE000;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  white-space: nowrap;
}

.chip span {
  color: #aaa;
  font-weight: 400;
}

#popular {
  margin-top: 16px;
}

#popular h3 {
  font-family: Arial Black, Impact, sans-serif;
  letter-spacing: 2px;
  margin-bottom: 8px;
  font-size: 1rem;
}

.pop-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.pop-label {
  font-size: 12px;
  font-weight: bold;
  min-width: 140px;
}

.pop-bar-wrap {
  flex: 1;
  background: #eee;
  height: 22px;
}

.pop-bar {
  background: #FFE000;
  height: 100%;
  min-width: 4px;
}

.pop-count {
  font-size: 12px;
  color: #666;
  min-width: 36px;
  text-align: right;
}

#lb-empty {
  text-align: center;
  padding: 40px;
  color: #aaa;
  font-size: 14px;
  letter-spacing: 2px;
}

/* Mobile */
@media (max-width: 600px) {
  #panel-draft.active {
    height: auto;
    min-height: calc(100vh - 46px);
  }

  #grid-wrap {
    padding: 2px 4px;
  }

  #grid {
    gap: 2px;
  }

  .row {
    height: 18vw;
    flex: none;
    gap: 2px;
  }

  .cards {
    gap: 2px;
  }

  .dollar {
    font-size: clamp(1rem, 5.5vw, 1.8rem);
    width: 32px;
  }

  .name {
    font-size: clamp(6px, 2vw, 10px);
    letter-spacing: .4px;
  }

  .sub {
    font-size: clamp(5px, 1.5vw, 8px);
    letter-spacing: .4px;
  }

  .tab {
    font-size: .75rem;
    letter-spacing: 1px;
  }

  #result-picks {
    gap: 5px;
  }

  #submit-section {
    width: calc(100% - 8px);
    padding: 10px;
  }

  #player-name {
    width: 100%;
  }

  #submit-btn,
  #reset-btn {
    flex: 1;
    padding: 10px 12px;
  }
}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="showTab('draft')">DRAFT BOARD</div>
  <div class="tab" onclick="showTab('lb')">LEADERBOARD</div>
</div>

<div id="panel-draft" class="panel active">
  <div id="status">WORLD LEADER DRAFT — $10 BUDGET · PICK 3</div>
  <div id="grid-wrap"><div id="grid"></div></div>

  <div id="submit-section">
    <h2>YOUR TEAM</h2>
    <div id="result-picks"></div>
    <div id="name-row">
      <input id="player-name" type="text" placeholder="Enter your name..." maxlength="40" autocomplete="name">
      <button id="submit-btn" onclick="submitDraft()">SUBMIT DRAFT</button>
      <button id="reset-btn" onclick="resetDraft()">↺ RESET</button>
    </div>
    <div id="submit-msg"></div>
  </div>
</div>

<div id="panel-lb" class="panel">
  <div id="lb-inner">
    <div id="lb-header">
      <h2>ALL DRAFTS</h2>
      <button id="refresh-btn" onclick="loadLeaderboard()">↺ REFRESH</button>
    </div>
    <div id="lb-stats"></div>
    <div id="lb-table-wrap"></div>
    <div id="popular"></div>
  </div>
</div>

<script>
const WORKER = "https://leader-draft.phummylw.workers.dev";

const ALL = [
  {id:1, n:"Abraham Lincoln",       c:"USA",          y:"1861-65",         $:5, img:"assets/leaders/lincoln.jpg"},
  {id:2, n:"Franklin D. Roosevelt", c:"USA",          y:"1933-45",         $:5, img:"assets/leaders/fdr.jpg"},
  {id:3, n:"Alexander the Great",   c:"Macedon",      y:"336-323 BC",      $:5, img:"assets/leaders/alexander.jpg"},
  {id:4, n:"Nelson Mandela",        c:"South Africa", y:"1994-99",         $:5, img:"assets/leaders/mandela.jpg"},
  {id:5, n:"Lee Kuan Yew",          c:"Singapore",    y:"1959-90",         $:5, img:"assets/leaders/lee-kuan-yew.jpg"},

  {id:6, n:"Mahatma Gandhi",        c:"India",        y:"1915-48",         $:4, img:"assets/leaders/gandhi.jpg"},
  {id:7, n:"Mustafa Kemal Ataturk", c:"Turkey",       y:"1923-38",         $:4, img:"assets/leaders/ataturk.jpg"},
  {id:8, n:"Winston Churchill",     c:"UK",           y:"1940-55",         $:4, img:"assets/leaders/churchill.jpg"},
  {id:9, n:"Julius Caesar",         c:"Rome",         y:"49-44 BC",        $:4, img:"assets/leaders/caesar.jpg"},
  {id:10,n:"Marcus Aurelius",       c:"Rome",         y:"161-180",         $:4, img:"assets/leaders/marcus-aurelius.jpg"},

  {id:11,n:"Napoleon Bonaparte",    c:"France",       y:"1804-14",         $:3, img:"assets/leaders/napoleon.jpg"},
  {id:12,n:"Genghis Khan",          c:"Mongolia",     y:"1206-27",         $:3, img:"assets/leaders/genghis-khan.jpg"},
  {id:13,n:"Elizabeth I",           c:"England",      y:"1558-1603",       $:3, img:"assets/leaders/elizabeth-i.jpg"},
  {id:14,n:"Margaret Thatcher",     c:"UK",           y:"1979-90",         $:3, img:"assets/leaders/thatcher.png"},
  {id:15,n:"Otto von Bismarck",     c:"Germany",      y:"1871-90",         $:3, img:"assets/leaders/bismarck.jpg"},

  {id:16,n:"Cleopatra",             c:"Egypt",        y:"51-30 BC",        $:2, img:"assets/leaders/cleopatra.jpg"},
  {id:17,n:"Henry VIII",            c:"England",      y:"1509-47",         $:2, img:"assets/leaders/henry-viii.jpg"},
  {id:18,n:"John F. Kennedy",       c:"USA",          y:"1961-63",         $:2, img:"assets/leaders/jfk.jpg"},
  {id:19,n:"Mao Zedong",            c:"China",        y:"1949-76",         $:2, img:"assets/leaders/mao.jpg"},
  {id:20,n:"Donald Trump",          c:"USA",          y:"2017-21 & 2025-", $:2, img:"assets/leaders/trump.jpg"},

  {id:21,n:"Adolf Hitler",          c:"Germany",      y:"1933-45",         $:1, img:"assets/leaders/hitler.jpg"},
  {id:22,n:"Joseph Stalin",         c:"USSR",         y:"1924-53",         $:1, img:"assets/leaders/stalin.jpg"},
  {id:23,n:"Saddam Hussein",        c:"Iraq",         y:"1979-2003",       $:1, img:"assets/leaders/saddam.jpg"},
  {id:24,n:"Pol Pot",               c:"Cambodia",     y:"1975-79",         $:1, img:"assets/leaders/pol-pot.jpg"},
  {id:25,n:"Vladimir Putin",        c:"Russia",       y:"2000-present",    $:1, img:"assets/leaders/putin.jpg"},
];

let sel = [];

function leaderById(id) {
  return ALL.find(l => l.id === id);
}

function spent() {
  return sel.reduce((sum, id) => sum + leaderById(id).$, 0);
}

function rem() {
  return 10 - spent();
}

function esc(text) {
  return String(text).replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[ch]));
}

function imgTag(src, alt, cls = "") {
  return `<img src="${esc(src)}" alt="${esc(alt)}" decoding="async" ${cls ? `class="${esc(cls)}"` : ""}>`;
}

function toggle(id) {
  const index = sel.indexOf(id);

  if (index > -1) {
    sel.splice(index, 1);
    render();
    return;
  }

  const leader = leaderById(id);
  if (!leader) return;
  if (sel.length >= 3) return;
  if (leader.$ > rem()) return;

  sel.push(id);
  render();
}

function render() {
  const remaining = rem();
  const done = sel.length === 3 && spent() === 10;

  document.getElementById("status").textContent = done
    ? "✓ TEAM COMPLETE — ENTER YOUR NAME BELOW"
    : "BUDGET: $" + remaining + "  ·  PICKS: " + sel.length + "/3";

  document.getElementById("grid").innerHTML = [5, 4, 3, 2, 1].map(cost => {
    const cards = ALL.filter(l => l.$ === cost).map(l => {
      const on = sel.includes(l.id);
      const off = !on && (l.$ > remaining || sel.length >= 3);

      return `<div class="card${on ? " on" : ""}${off ? " off" : ""}" onclick="toggle(${l.id})">
        ${imgTag(l.img, l.n)}
        <div class="label">
          <div class="name">${esc(l.n)}</div>
          <div class="sub">${esc(l.c)} · ${esc(l.y)}</div>
        </div>
      </div>`;
    }).join("");

    return `<div class="row"><div class="dollar">$${cost}</div><div class="cards">${cards}</div></div>`;
  }).join("");

  const submitSection = document.getElementById("submit-section");

  if (done) {
    document.getElementById("result-picks").innerHTML = sel.map(id => {
      const l = leaderById(id);
      return `<div class="pick">
        ${imgTag(l.img, l.n)}
        <div class="pick-info">
          <div class="pick-name">${esc(l.n)}</div>
          <div class="pick-sub">${esc(l.c)} · ${esc(l.y)}</div>
          <div class="pick-cost">$${l.$}</div>
        </div>
      </div>`;
    }).join("");

    submitSection.style.display = "block";

    const msg = document.getElementById("submit-msg");
    if (!msg.dataset.keep) {
      msg.textContent = "";
      msg.style.color = "#111";
      document.getElementById("submit-btn").disabled = false;
    }

    setTimeout(() => submitSection.scrollIntoView({ behavior: "smooth", block: "nearest" }), 50);
  } else {
    submitSection.style.display = "none";
    const msg = document.getElementById("submit-msg");
    msg.dataset.keep = "";
  }
}

function resetDraft() {
  sel = [];
  document.getElementById("player-name").value = "";
  const msg = document.getElementById("submit-msg");
  msg.textContent = "";
  msg.dataset.keep = "";
  document.getElementById("submit-btn").disabled = false;
  render();
}

async function submitDraft() {
  const nameInput = document.getElementById("player-name");
  const name = nameInput.value.trim();
  const btn = document.getElementById("submit-btn");
  const msg = document.getElementById("submit-msg");

  if (!name) {
    msg.style.color = "red";
    msg.textContent = "Please enter your name.";
    return;
  }

  if (!(sel.length === 3 && spent() === 10)) {
    msg.style.color = "red";
    msg.textContent = "Draft must be exactly 3 picks totaling $10.";
    return;
  }

  btn.disabled = true;
  msg.dataset.keep = "1";
  msg.style.color = "#111";
  msg.textContent = "Saving...";

  try {
    const res = await fetch(WORKER, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, pickIds: sel })
    });

    let body = {};
    try { body = await res.json(); } catch (_) {}

    if (!res.ok) {
      throw new Error(body.error || "Worker responded " + res.status);
    }

    msg.style.color = "green";
    msg.textContent = "✓ Draft saved. Check the Leaderboard tab.";
    btn.disabled = true;
  } catch (e) {
    msg.style.color = "red";
    msg.textContent = "✗ " + e.message;
    btn.disabled = false;
  }
}

async function loadLeaderboard() {
  document.getElementById("lb-table-wrap").innerHTML = '<div id="lb-empty">Loading...</div>';
  document.getElementById("lb-stats").innerHTML = "";
  document.getElementById("popular").innerHTML = "";

  let data;

  try {
    const res = await fetch(WORKER, { method: "GET" });
    const j = await res.json();
    if (!res.ok) throw new Error(j.error || "Worker responded " + res.status);
    data = Array.isArray(j.data) ? j.data : [];
  } catch (e) {
    document.getElementById("lb-table-wrap").innerHTML =
      `<div id="lb-empty">Error loading leaderboard: ${esc(e.message)}</div>`;
    return;
  }

  if (!data.length) {
    document.getElementById("lb-table-wrap").innerHTML =
      '<div id="lb-empty">NO DRAFTS YET — BE THE FIRST!</div>';
    return;
  }

  const counts = {};
  for (const draft of data) {
    if (!Array.isArray(draft.picks)) continue;
    for (const pick of draft.picks) {
      counts[pick.name] = (counts[pick.name] || 0) + 1;
    }
  }

  const sortedCounts = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  const top = sortedCounts[0] || ["None", 0];

  document.getElementById("lb-stats").innerHTML = `
    <div class="stat-box">
      <div class="stat-num">${data.length}</div>
      <div class="stat-label">Total Drafts</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${Object.keys(counts).length}</div>
      <div class="stat-label">Leaders Picked</div>
    </div>
    <div class="stat-box" style="flex:2">
      <div class="stat-num" style="font-size:1rem;margin-top:6px">${esc(top[0])}</div>
      <div class="stat-label">Most Popular (${top[1]}x)</div>
    </div>`;

  document.getElementById("lb-table-wrap").innerHTML = `<table>
    <thead>
      <tr>
        <th>NAME</th>
        <th>PICKS</th>
        <th>TOTAL</th>
        <th>DATE</th>
      </tr>
    </thead>
    <tbody>${[...data].reverse().map(d => {
      const date = d.timestamp
        ? new Date(d.timestamp).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
        : "";

      return `<tr>
        <td style="font-weight:700">${esc(d.name || "Anonymous")}</td>
        <td><div class="pick-chips">${(d.picks || []).map(p =>
          `<div class="chip">${esc(p.name)} <span>$${esc(p.cost)}</span></div>`
        ).join("")}</div></td>
        <td style="text-align:center;font-family:Arial Black,Impact,sans-serif">$${esc(d.total || "")}</td>
        <td style="color:#aaa;font-size:11px;white-space:nowrap">${esc(date)}</td>
      </tr>`;
    }).join("")}</tbody>
  </table>`;

  const max = Math.max(...Object.values(counts));

  document.getElementById("popular").innerHTML = `<h3>MOST DRAFTED LEADERS</h3>` +
    sortedCounts.slice(0, 10).map(([name, count]) =>
      `<div class="pop-row">
        <div class="pop-label">${esc(name)}</div>
        <div class="pop-bar-wrap"><div class="pop-bar" style="width:${Math.round(count / max * 100)}%"></div></div>
        <div class="pop-count">${count}x</div>
      </div>`
    ).join("");
}

function showTab(id) {
  document.querySelectorAll(".tab").forEach((tab, i) => {
    tab.classList.toggle("active", ["draft", "lb"][i] === id);
  });

  document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
  document.getElementById("panel-" + id).classList.add("active");

  if (id === "lb") loadLeaderboard();
}

render();
</script>
</body>
</html>
